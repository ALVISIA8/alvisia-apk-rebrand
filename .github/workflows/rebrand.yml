name: Rebrand APK

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      apk_url:
        required: false
        type: string
      icon_url:
        required: false
        type: string
      app_name:
        required: false
        type: string
      old_pkg:
        required: false
        type: string
      new_pkg:
        required: false
        type: string
      old_url:
        required: false
        type: string
      new_url:
        required: false
        type: string
      old_key:
        required: false
        type: string
      new_key:
        required: false
        type: string
      bypass_login:
        required: false
        type: string
      extra_replacements:
        required: false
        type: string

jobs:
  rebrand:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run Rebrand
        run: echo "Job ${{ inputs.job_id }} received"
